<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Diario Pasti</title>
  <style>
    :root{
      --bg:#f3f1eb;
      --card:#ffffff;
      --text:#171717;
      --muted:#6b6b6b;
      --border:#d8d5ce;
      --strong:#111111;
      --danger:#a43737;
      --soft:#7a7a7a;
      --ok:#2d6b3d;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --radius:18px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    body{
      min-height:100vh;
      padding-bottom:120px;
    }

    .wrap{
      width:min(100%, 760px);
      margin:0 auto;
      padding:16px 14px 24px;
    }

    .top{
      position:sticky;
      top:0;
      z-index:20;
      background:linear-gradient(to bottom, rgba(243,241,235,.98), rgba(243,241,235,.92));
      backdrop-filter: blur(8px);
      padding:10px 0 12px;
      margin-bottom:12px;
    }

    h1{
      margin:0 0 10px;
      font-size:1.55rem;
      line-height:1.08;
      font-weight:800;
      letter-spacing:.01em;
    }

    .subtitle{
      margin:0 0 12px;
      color:var(--muted);
      font-size:.92rem;
      line-height:1.35;
    }

    .date-wrap{
      position:relative;
      margin-bottom:10px;
    }

    .date-box{
      background:var(--card);
      border:2px solid var(--strong);
      border-radius:14px;
      padding:12px 14px;
      box-shadow:var(--shadow);
      min-height:58px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .date-text{
      display:flex;
      flex-direction:column;
      gap:2px;
    }

    .date-label-small{
      font-size:.75rem;
      font-weight:800;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.06em;
    }

    .date-value{
      font-size:1rem;
      font-weight:800;
    }

    .date-hint{
      font-size:.8rem;
      color:var(--muted);
      white-space:nowrap;
    }

    .date-input-overlay{
      position:absolute;
      inset:0;
      opacity:0;
      cursor:pointer;
    }

    .top-actions{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }

    .status{
      font-size:.84rem;
      color:var(--ok);
      font-weight:700;
      min-height:20px;
      padding-left:2px;
    }

    .meal-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .meal-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:14px;
      box-shadow:var(--shadow);
    }

    .meal-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .meal-title{
      margin:0;
      font-size:1.14rem;
      font-weight:800;
      letter-spacing:.02em;
      text-transform:uppercase;
    }

    .section{
      margin-top:10px;
    }

    .section-label{
      display:block;
      margin:0 0 8px;
      font-size:.82rem;
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    .food-rows{
      display:grid;
      gap:10px;
    }

    .food-row{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      padding:10px;
      border:1px solid #ebe8e2;
      border-radius:14px;
      background:#fcfbf8;
    }

    input, textarea, button{
      font:inherit;
    }

    input, textarea{
      width:100%;
      border:1.5px solid var(--border);
      background:#fff;
      color:var(--text);
      border-radius:12px;
      padding:13px 14px;
      font-size:16px;
      outline:none;
      appearance:none;
    }

    input:focus, textarea:focus{
      border-color:#777;
      box-shadow:0 0 0 3px rgba(0,0,0,.06);
    }

    textarea{
      min-height:92px;
      resize:vertical;
    }

    .btn{
      border:none;
      border-radius:12px;
      padding:13px 14px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      min-height:48px;
    }

    .btn:active{
      transform:translateY(1px);
    }

    .btn-dark{
      background:var(--strong);
      color:#fff;
    }

    .btn-soft{
      background:var(--soft);
      color:#fff;
    }

    .btn-danger{
      background:var(--danger);
      color:#fff;
    }

    .btn-outline{
      background:#fff;
      color:var(--strong);
      border:1.5px solid var(--strong);
    }

    .btn-light-outline{
      background:#fff;
      color:var(--soft);
      border:1.5px solid var(--border);
    }

    .row-actions{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }

    .meal-actions{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
      margin-top:10px;
    }

    .hint{
      font-size:.88rem;
      color:var(--muted);
      margin:14px 2px 4px;
      line-height:1.4;
    }

    .sticky-actions{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:30;
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
      background:linear-gradient(to top, rgba(243,241,235,.98), rgba(243,241,235,.9));
      backdrop-filter:blur(8px);
      border-top:1px solid rgba(0,0,0,.08);
    }

    .sticky-actions-inner{
      width:min(100%, 760px);
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }

    @media (min-width:640px){
      .wrap{
        padding:20px 18px 28px;
      }

      .top-actions{
        grid-template-columns:1fr 1fr;
      }

      .food-row{
        grid-template-columns:minmax(0, 1fr) 170px 140px;
        align-items:center;
      }

      .meal-actions{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Diario Pasti</h1>
      <p class="subtitle">Compila il giorno, cambia data quando vuoi, e il browser salva tutto da solo.</p>

      <div class="date-wrap">
        <div class="date-box">
          <div class="date-text">
            <span class="date-label-small">Data</span>
            <span class="date-value" id="todayDateLabel"></span>
          </div>
          <span class="date-hint">Tocca per cambiare</span>
        </div>
        <input type="date" id="datePicker" class="date-input-overlay" />
      </div>

      <div class="top-actions">
        <button class="btn btn-outline" id="duplicateYesterdayBtn">Duplica da ieri</button>
        <div class="status" id="saveStatus">Salvataggio automatico attivo</div>
      </div>
    </div>

    <div class="meal-grid" id="mealGrid"></div>

    <p class="hint">
      I dati vengono salvati per ogni singola data nel browser del dispositivo. Il tasto <strong>Salva TXT</strong> esporta solo il giorno che stai guardando.
    </p>
  </div>

  <div class="sticky-actions">
    <div class="sticky-actions-inner">
      <button class="btn btn-dark" id="saveTxtBtn">Salva TXT</button>
      <button class="btn btn-soft" id="clearDayBtn">Pulisci giorno</button>
      <button class="btn btn-light-outline" id="todayBtn">Oggi</button>
    </div>
  </div>

  <template id="mealTemplate">
    <section class="meal-card" data-meal="">
      <div class="meal-header">
        <h2 class="meal-title"></h2>
      </div>

      <div class="section">
        <span class="section-label">1. Cosa hai mangiato</span>
        <div class="food-rows"></div>
        <div class="meal-actions">
          <button type="button" class="btn btn-outline add-row-btn">+ Aggiungi riga</button>
          <button type="button" class="btn btn-light-outline clear-meal-btn">Pulisci questo pasto</button>
        </div>
      </div>

      <div class="section">
        <span class="section-label">2. Note</span>
        <textarea class="meal-notes" placeholder="Scrivi eventuali note..."></textarea>
      </div>
    </section>
  </template>

  <script>
    const meals = [
      'Colazione',
      'Spuntino 1',
      'Pranzo',
      'Spuntino 2',
      'Cena',
      'Spuntino 3'
    ];

    const STORAGE_PREFIX = 'diario-pasti:';
    const mealGrid = document.getElementById('mealGrid');
    const mealTemplate = document.getElementById('mealTemplate');
    const datePicker = document.getElementById('datePicker');
    const todayDateLabel = document.getElementById('todayDateLabel');
    const saveStatus = document.getElementById('saveStatus');

    function getTodayKey() {
      const now = new Date();
      return formatDateKey(now);
    }

    function formatDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatDisplayDate(dateKey) {
      const [year, month, day] = dateKey.split('-').map(Number);
      const date = new Date(year, month - 1, day, 12, 0, 0);
      return date.toLocaleDateString('it-IT', {
        weekday: 'long',
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      });
    }

    function setStatus(message) {
      saveStatus.textContent = message;
      clearTimeout(setStatus._timer);
      setStatus._timer = setTimeout(() => {
        saveStatus.textContent = 'Salvataggio automatico attivo';
      }, 1600);
    }

    function storageKey(dateKey) {
      return STORAGE_PREFIX + dateKey;
    }

    function createEmptyMealData() {
      return {
        items: [
          { food: '', qty: '' },
          { food: '', qty: '' }
        ],
        notes: ''
      };
    }

    function createEmptyDayData() {
      return meals.map(() => createEmptyMealData());
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function createFoodRow(foodValue = '', qtyValue = '') {
      const row = document.createElement('div');
      row.className = 'food-row';
      row.innerHTML = `
        <input type="text" class="food-input" placeholder="Cosa hai mangiato" value="${escapeHtml(foodValue)}">
        <input type="text" class="qty-input" placeholder="Quantità" value="${escapeHtml(qtyValue)}">
        <div class="row-actions">
          <button type="button" class="btn btn-danger remove-row-btn">Rimuovi</button>
        </div>
      `;
      return row;
    }

    function renderCards() {
      mealGrid.innerHTML = '';

      meals.forEach((mealName, index) => {
        const clone = mealTemplate.content.cloneNode(true);
        const card = clone.querySelector('.meal-card');
        const title = clone.querySelector('.meal-title');

        card.dataset.index = index;
        card.dataset.meal = mealName;
        title.textContent = mealName;

        mealGrid.appendChild(clone);
      });
    }

    function populateDayData(dayData) {
      const cards = document.querySelectorAll('.meal-card');

      cards.forEach((card, index) => {
        const rowsContainer = card.querySelector('.food-rows');
        const notesField = card.querySelector('.meal-notes');
        const mealData = dayData[index] || createEmptyMealData();

        rowsContainer.innerHTML = '';

        const items = Array.isArray(mealData.items) && mealData.items.length
          ? mealData.items
          : createEmptyMealData().items;

        items.forEach(item => {
          rowsContainer.appendChild(createFoodRow(item.food || '', item.qty || ''));
        });

        notesField.value = mealData.notes || '';
      });
    }

    function readCurrentDayDataFromUI() {
      const cards = document.querySelectorAll('.meal-card');
      const data = [];

      cards.forEach(card => {
        const rows = card.querySelectorAll('.food-row');
        const notes = card.querySelector('.meal-notes').value.trim();

        const items = [];
        rows.forEach(row => {
          items.push({
            food: row.querySelector('.food-input').value.trim(),
            qty: row.querySelector('.qty-input').value.trim()
          });
        });

        data.push({ items, notes });
      });

      return data;
    }

    function saveCurrentDay() {
      const dateKey = datePicker.value;
      const data = readCurrentDayDataFromUI();
      localStorage.setItem(storageKey(dateKey), JSON.stringify(data));
      setStatus('Salvato');
    }

    function loadDay(dateKey) {
      datePicker.value = dateKey;
      todayDateLabel.textContent = formatDisplayDate(dateKey);

      const raw = localStorage.getItem(storageKey(dateKey));
      let data;

      try {
        data = raw ? JSON.parse(raw) : createEmptyDayData();
      } catch (error) {
        data = createEmptyDayData();
      }

      populateDayData(data);
      setStatus('Giorno caricato');
    }

    function clearMeal(card) {
      const rowsContainer = card.querySelector('.food-rows');
      const notesField = card.querySelector('.meal-notes');

      rowsContainer.innerHTML = '';
      rowsContainer.appendChild(createFoodRow('', ''));
      rowsContainer.appendChild(createFoodRow('', ''));
      notesField.value = '';

      saveCurrentDay();
    }

    function clearWholeDay() {
      populateDayData(createEmptyDayData());
      saveCurrentDay();
    }

    function hasMeaningfulData(dayData) {
      return dayData.some(meal =>
        (meal.items || []).some(item => (item.food || '').trim() || (item.qty || '').trim()) ||
        (meal.notes || '').trim()
      );
    }

    function getYesterdayKey(dateKey) {
      const [year, month, day] = dateKey.split('-').map(Number);
      const d = new Date(year, month - 1, day, 12, 0, 0);
      d.setDate(d.getDate() - 1);
      return formatDateKey(d);
    }

    function duplicateFromYesterday() {
      const currentKey = datePicker.value;
      const yesterdayKey = getYesterdayKey(currentKey);

      const yesterdayRaw = localStorage.getItem(storageKey(yesterdayKey));
      if (!yesterdayRaw) {
        alert('Nessun dato trovato per ieri.');
        return;
      }

      let yesterdayData;
      try {
        yesterdayData = JSON.parse(yesterdayRaw);
      } catch (error) {
        alert('I dati di ieri risultano danneggiati.');
        return;
      }

      const currentData = readCurrentDayDataFromUI();
      if (hasMeaningfulData(currentData)) {
        const proceed = confirm('Il giorno corrente contiene già dati. Vuoi sovrascriverli con quelli di ieri?');
        if (!proceed) return;
      }

      populateDayData(yesterdayData);
      saveCurrentDay();
      setStatus('Dati di ieri duplicati');
    }

    function exportTxt() {
      const dateKey = datePicker.value;
      const displayDate = formatDisplayDate(dateKey);
      const dayData = readCurrentDayDataFromUI();

      let output = `DIARIO PASTI\nData: ${displayDate}\n\n`;

      dayData.forEach((mealData, index) => {
        output += `${meals[index].toUpperCase()}\n`;
        output += `1. Cosa hai mangiato:\n`;

        let found = false;
        mealData.items.forEach(item => {
          const food = (item.food || '').trim();
          const qty = (item.qty || '').trim();

          if (food || qty) {
            found = true;
            output += `- ${food || '(vuoto)'} | Quantità: ${qty || '(vuoto)'}\n`;
          }
        });

        if (!found) {
          output += `- Nessun dato inserito\n`;
        }

        output += `2. Note:\n${mealData.notes || 'Nessuna nota'}\n\n`;
      });

      const blob = new Blob([output], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `diario-pasti-${dateKey}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      setStatus('TXT scaricato');
    }

    mealGrid.addEventListener('click', (event) => {
      const target = event.target;

      if (target.classList.contains('add-row-btn')) {
        const card = target.closest('.meal-card');
        const rowsContainer = card.querySelector('.food-rows');
        rowsContainer.appendChild(createFoodRow('', ''));
        saveCurrentDay();
      }

      if (target.classList.contains('remove-row-btn')) {
        const row = target.closest('.food-row');
        const rowsContainer = row.parentElement;

        if (rowsContainer.children.length > 1) {
          row.remove();
        } else {
          row.querySelector('.food-input').value = '';
          row.querySelector('.qty-input').value = '';
        }

        saveCurrentDay();
      }

      if (target.classList.contains('clear-meal-btn')) {
        const card = target.closest('.meal-card');
        const proceed = confirm('Vuoi pulire solo questo pasto?');
        if (!proceed) return;
        clearMeal(card);
      }
    });

    mealGrid.addEventListener('input', () => {
      saveCurrentDay();
    });

    datePicker.addEventListener('change', () => {
      loadDay(datePicker.value);
    });

    document.getElementById('duplicateYesterdayBtn').addEventListener('click', duplicateFromYesterday);
    document.getElementById('saveTxtBtn').addEventListener('click', exportTxt);

    document.getElementById('clearDayBtn').addEventListener('click', () => {
      const proceed = confirm('Vuoi cancellare tutto il giorno selezionato?');
      if (!proceed) return;
      clearWholeDay();
      setStatus('Giorno pulito');
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      loadDay(getTodayKey());
    });

    renderCards();
    loadDay(getTodayKey());
  </script>
</body>
</html>
